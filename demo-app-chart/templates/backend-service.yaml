apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-backend" .Release.Name }}
  labels:
    app: {{ printf "%s-backend" .Release.Name }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ printf "%s-backend" .Release.Name }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
      protocol: TCP
      name: http
