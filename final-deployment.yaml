apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: kiran
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
      - name: demo-app
        image: kiranprusty/demo-app:v2
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: demo-app-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: demo-app-config
              key: PORT
        - name: DB_PATH
          valueFrom:
            configMapKeyRef:
              name: demo-app-config
              key: DATABASE_PATH
        - name: DOCKERHUB_PAT
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DOCKERHUB_PAT

---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-svc
  namespace: kiran
spec:
  type: NodePort
  selector:
    app: demo-app
  ports:
  - port: 3000
    targetPort: 3000

