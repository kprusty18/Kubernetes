apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-app-stateful
  namespace: kiran
spec:
  serviceName: demo-app-headless
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
      - name: demo-app
        image: kiran338/kubernetes:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: demo-app-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: demo-app-config
              key: PORT
        - name: DB_PATH
          valueFrom:
            configMapKeyRef:
              name: demo-app-config
              key: DATABASE_PATH
        - name: DOCKERHUB_PAT
          valueFrom:
            secretKeyRef:
              name: dockerhub-secret
              key: DOCKERHUB_PAT
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: demo-app-pvc
  volumeClaimTemplates: []

---

apiVersion: v1
kind: Service
metadata:
  name: demo-app-headless
  namespace: kiran
spec:
  type: NodePort
  selector:
    app: demo-app
  ports:
  - port: 3000
    targetPort: 3000
